<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, -apple-system, sans-serif; font-size: 12px; color: #333; padding: 16px; }
    h2 { font-size: 14px; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 12px; font-size: 11px; }
    textarea {
      width: 100%; height: 200px; padding: 8px;
      border: 1px solid #ddd; border-radius: 6px;
      font-family: monospace; font-size: 11px;
      resize: vertical;
    }
    textarea:focus { border-color: #a259ff; outline: none; }
    .actions { margin-top: 12px; display: flex; gap: 8px; }
    button {
      padding: 8px 16px; border-radius: 6px; font-size: 12px;
      font-weight: 600; cursor: pointer; border: none;
    }
    .btn-primary { background: #a259ff; color: white; }
    .btn-primary:hover { background: #8b3fe0; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary { background: #f0f0f0; color: #333; border: 1px solid #ddd; }
    #status { margin-top: 12px; font-size: 11px; color: #666; }
    #status.error { color: #c00; }
    #status.success { color: #18a957; }
    #progress { margin-top: 8px; height: 4px; background: #eee; border-radius: 2px; overflow: hidden; display: none; }
    #progress-bar { height: 100%; background: #a259ff; width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>
  <h2>DOM Import</h2>
  <p>Paste the JSON captured by the Chrome extension, then click Import.</p>

  <textarea id="json-input" placeholder="Paste JSON here..."></textarea>

  <div class="actions">
    <button id="import-btn" class="btn-primary">Import to Figma</button>
    <button id="clear-btn" class="btn-secondary">Clear</button>
  </div>

  <div id="progress"><div id="progress-bar"></div></div>
  <div id="status"></div>

  <script>
    const jsonInput = document.getElementById('json-input');
    const importBtn = document.getElementById('import-btn');
    const clearBtn = document.getElementById('clear-btn');
    const statusEl = document.getElementById('status');
    const progressEl = document.getElementById('progress');
    const progressBar = document.getElementById('progress-bar');

    importBtn.addEventListener('click', () => {
      const text = jsonInput.value.trim();
      if (!text) {
        setStatus('Please paste JSON first', 'error');
        return;
      }

      try {
        const data = JSON.parse(text);
        importBtn.disabled = true;
        progressEl.style.display = 'block';
        setStatus('Importing...');
        parent.postMessage({ pluginMessage: { type: 'import', data } }, '*');
      } catch (e) {
        setStatus('Invalid JSON: ' + e.message, 'error');
      }
    });

    clearBtn.addEventListener('click', () => {
      jsonInput.value = '';
      statusEl.textContent = '';
      progressEl.style.display = 'none';
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (msg.type === 'progress') {
        progressBar.style.width = msg.percent + '%';
        setStatus(`Creating nodes... ${msg.percent}%`);
      }
      if (msg.type === 'done') {
        importBtn.disabled = false;
        progressBar.style.width = '100%';
        setStatus(`Done! Created ${msg.nodeCount} nodes.`, 'success');
      }
      if (msg.type === 'error') {
        importBtn.disabled = false;
        setStatus('Error: ' + msg.message, 'error');
      }
    };

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = type || '';
    }
  </script>
</body>
</html>
