<h3>Alert ViewChild Demo</h3>
<sgds-button (click)="showAlert()">Show Alert</sgds-button>
<sgds-button (click)="closeAlert()">Close Alert</sgds-button>
<sgds-alert #alert variant="primary" dismissible [show]="false">This alert is controlled via ViewChild with typed ElementRef&lt;SgdsAlert&gt;</sgds-alert>
