<script type="module" src="../src/index.ts"></script>
<link href="../src/themes/day.css" rel="stylesheet" type="text/css" />
<link href="../src/themes/night.css" rel="stylesheet" type="text/css" />
<link href="../src/css/sgds.css" rel="stylesheet" type="text/css" />

<sgds-masthead></sgds-masthead>
<sgds-system-banner show></sgds-system-banner>
<sgds-mainnav></sgds-mainnav>

<style>
  .container {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    padding: 2rem;
  }
</style>

<div class="container">
  <sgds-button id="btn-top-center">Show Toast (top-center)</sgds-button>
  <sgds-button id="btn-bottom-end">Show Toast (bottom-end)</sgds-button>
</div>

<script type="module">
  import { toast } from "../src/components/Toast/index.ts";

  let topCount = 0;
  let bottomCount = 0;

  document.getElementById("btn-top-center").addEventListener("click", () => {
    topCount++;
    toast({
      title: `Top Toast #${topCount}`,
      message: "This toast slides down from the top.",
      variant: "neutral",
      position: "top-center",
      delay: 5000
    });
  });

  document.getElementById("btn-bottom-end").addEventListener("click", () => {
    bottomCount++;
    toast({
      title: `Bottom Toast #${bottomCount}`,
      message: "This toast slides up from the bottom.",
      variant: "success",
      position: "bottom-end",
      delay: 5000
    });
  });
</script>
