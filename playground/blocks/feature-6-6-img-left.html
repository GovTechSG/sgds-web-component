<link href="../css/fonts.css" rel="stylesheet" type="text/css" />
<script type="module" src="../../src/index.ts"></script>
<link href="../../src/themes/day.css" rel="stylesheet" type="text/css" />
<link href="../../src/themes/night.css" rel="stylesheet" type="text/css" />
<link href="../../src/css/sgds.css" rel="stylesheet" type="text/css" />
<link href="../css/utility.css" rel="stylesheet" type="text/css" />

<style>
  @media (max-width: 1023px) {
    .feature-img { padding-bottom: var(--sgds-spacing-layout-md); }
  }
  @media (min-width: 1024px) {
    .feature-content { padding-left: var(--sgds-spacing-layout-md); }
  }
</style>

<body>
  <!-- Feature Block — image left 6 cols / content right 6 cols
       Background : bg-surface-default
       Spacing    : py-layout-lg, gap-layout-md
       Content    : padding-right layout-md (outer edge, image on left)
  -->
  <section class="sgds:bg-default sgds:py-layout-lg sgds:min-h-[600px]">
    <div class="sgds-container">
      <div class="sgds-grid sgds:items-center" style="gap: var(--sgds-gap-layout-md);">

        <!-- Image — 6 cols -->
        <div class="feature-img sgds-col-4 sgds-col-sm-8 sgds-col-lg-6" style="align-self: stretch;">
          <img
            src="placeholder-sgds.png"
            alt=""
            style="width: 100%; aspect-ratio: 3 / 2; object-fit: cover; display: block; border-radius: var(--sgds-border-radius-xl);"
          />
        </div>

        <!-- Content — 6 cols, padding-right layout-md (image on left) -->
        <div
          class="feature-content sgds-col-4 sgds-col-sm-8 sgds-col-lg-6 sgds:flex sgds:flex-col sgds:items-start sgds:text-left"
                  >
          <!-- Typography group -->
          <div class="sgds:mb-xl">
            <div class="sgds:text-overline-md sgds:font-semibold sgds:leading-2-xs sgds:tracking-wide sgds:uppercase sgds:text-label-default sgds:mb-xs">
              Overline Label
            </div>
            <h2 class="sgds:text-display-md sgds:font-bold sgds:leading-2-xl sgds:tracking-tighter sgds:text-display-default">
              Feature Heading Goes Here
            </h2>
            <h5 class="sgds:text-subtitle-md sgds:font-light sgds:leading-xs sgds:tracking-normal sgds:text-heading-subtle">
              Supporting subtitle text that provides context and detail for the feature being described.
            </h5>
          </div>
          <sgds-button variant="primary" tone="neutral" size="md">Get Started</sgds-button>
        </div>

      </div>
    </div>
  </section></body>
