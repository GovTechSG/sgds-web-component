<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height" />
    <script type="module" src="../src/index.ts"></script>
    <link href="../src/themes/day.css" rel="stylesheet" type="text/css" />
    <link href="../src/themes/night.css" rel="stylesheet" type="text/css" />
    <link href="../src/css/sgds.css" rel="stylesheet" type="text/css" />
    <style>
      .container {
        max-width: 800px;
        margin: 36px auto;
        display: flex;
        flex-direction: column;
        gap: 36px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div>
        <h2>Radio Group</h2>
        <sgds-radio-group label="Choose a fruit" name="fruit">
          <sgds-radio value="apple">Apple</sgds-radio>
          <sgds-radio value="banana">Banana</sgds-radio>
          <sgds-radio value="cherry">Cherry</sgds-radio>
        </sgds-radio-group>
      </div>

      <div>
        <h2>Pre-selected</h2>
        <sgds-radio-group label="Size" name="size" value="medium">
          <sgds-radio value="small">Small</sgds-radio>
          <sgds-radio value="medium">Medium</sgds-radio>
          <sgds-radio value="large">Large</sgds-radio>
        </sgds-radio-group>
      </div>

      <div>
        <h2>With Disabled Option</h2>
        <sgds-radio-group label="Plan" name="plan">
          <sgds-radio value="free">Free</sgds-radio>
          <sgds-radio value="pro">Pro</sgds-radio>
          <sgds-radio value="enterprise" disabled>Enterprise (Coming soon)</sgds-radio>
        </sgds-radio-group>
      </div>

      <div>
        <h2>Required Validation</h2>
        <form class="sgds:flex sgds:flex-col sgds:gap-layout-xs">
          <sgds-radio-group label="Agreement" name="agreement" required hasFeedback>
            <sgds-radio value="yes">I agree</sgds-radio>
            <sgds-radio value="no">I disagree</sgds-radio>
          </sgds-radio-group>
          <div class="sgds:flex sgds:justify-end sgds:gap-component-xs">
            <sgds-button type="reset" variant="ghost">Reset</sgds-button>
            <sgds-button type="submit">Submit</sgds-button>
          </div>
        </form>
      </div>

      <div>
        <h2>With Autofocus</h2>
        <sgds-radio-group label="Notification Preference" name="notification-pref" value="email" autofocus>
          <sgds-radio value="email">Email</sgds-radio>
          <sgds-radio value="sms">SMS</sgds-radio>
          <sgds-radio value="push">Push Notification</sgds-radio>
        </sgds-radio-group>
      </div>

      <div>
        <h2>Custom Validation with noValidate</h2>
        <form id="custom-validation-radio-form" class="sgds:flex sgds:flex-col sgds:gap-layout-xs">
          <sgds-radio-group
            noValidate
            required
            label="Gender"
            hintText="Please select a gender"
            name="gender"
            hasFeedback
            id="custom-validation-radio-group"
          >
            <sgds-radio value="male">Male</sgds-radio>
            <sgds-radio value="female">Female</sgds-radio>
            <sgds-radio value="other">Other</sgds-radio>
          </sgds-radio-group>
          <div class="sgds:flex sgds:justify-end sgds:gap-component-xs">
            <sgds-button type="reset" variant="ghost">Reset</sgds-button>
            <sgds-button type="submit">Submit</sgds-button>
          </div>
        </form>
        <script>
          const radioGroup = document.getElementById("custom-validation-radio-group");
          const radioForm = document.getElementById("custom-validation-radio-form");

          radioGroup.addEventListener("sgds-change", e => {
            if (!e.target.value) {
              e.target.setInvalid(true);
              e.target.invalidFeedback = "Please select a gender";
            } else {
              e.target.setInvalid(false);
            }
          });

          radioForm.addEventListener("submit", e => {
            e.preventDefault();
            if (!radioGroup.value) {
              radioGroup.setInvalid(true);
              radioGroup.invalidFeedback = "Please select a gender";
              return;
            }
            if (radioGroup.invalid) return;
            alert("Form submitted successfully despite required field — constraint validation was disabled by the noValidate property.");
          });
        </script>
      </div>
    </div>
  </body>
</html>
